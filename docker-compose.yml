version: '3.8'
services:
  postgres:
    image: postgres:15-alpine
    container_name: locked_in_reality_db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: locked_in_reality
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
